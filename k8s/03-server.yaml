apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-server
  namespace: pcap-testbed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fl-server
  template:
    metadata:
      labels:
        app: fl-server
    spec:
      containers:
        - name: fl-server
          image: local/fl-server:0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: fl-server
  namespace: pcap-testbed
spec:
  selector:
    app: fl-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
