apiVersion: v1
kind: Pod
metadata:
  name: model-loader
  namespace: pcap-testbed
spec:
  restartPolicy: Never
  containers:
    - name: loader
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: models
          mountPath: /models
  volumes:
    - name: models
      persistentVolumeClaim:
        claimName: models-pvc
