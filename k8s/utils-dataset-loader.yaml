apiVersion: v1
kind: Pod
metadata:
  name: dataset-loader
  namespace: pcap-testbed
spec:
  restartPolicy: Never
  containers:
    - name: loader
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: datasets
          mountPath: /datasets
  volumes:
    - name: datasets
      persistentVolumeClaim:
        claimName: datasets-pvc
